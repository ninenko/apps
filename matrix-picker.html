<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATRIX NAME PICKER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --bg-panel: rgba(0, 15, 0, 0.65);
    --green: #00ff41;
    --green-dim: #003b00;
    --green-mid: #00aa2a;
    --green-glow: 0 0 10px #00ff41, 0 0 30px rgba(0,255,65,0.3);
    --green-glow-strong: 0 0 10px #00ff41, 0 0 40px rgba(0,255,65,0.5), 0 0 80px rgba(0,255,65,0.2);
    --border: rgba(0, 255, 65, 0.25);
    --border-bright: rgba(0, 255, 65, 0.6);
    --font-mono: 'Share Tech Mono', 'Courier New', monospace;
    --font-display: 'VT323', 'Courier New', monospace;
  }

  body {
    font-family: var(--font-mono);
    background: var(--bg);
    color: var(--green);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* CRT Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* CRT flicker */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(0, 255, 65, 0.02);
    pointer-events: none;
    z-index: 999;
    animation: flicker 0.1s infinite alternate;
  }

  @keyframes flicker {
    0% { opacity: 0.02; }
    100% { opacity: 0.04; }
  }

  /* Matrix rain canvas */
  #matrixCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 650;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }

  #matrixCanvas.active {
    opacity: 1;
  }

  /* Reveal overlay */
  #revealOverlay {
    position: fixed;
    inset: 0;
    z-index: 700;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(0, 0, 0, 0.92);
    transition: background 0.5s ease;
  }

  #revealOverlay.active {
    display: flex;
  }

  #revealOverlay.picking {
    background: rgba(0, 0, 0, 0.35);
  }

  .revealed-name {
    font-family: var(--font-display);
    font-size: clamp(3rem, 10vw, 8rem);
    color: var(--green);
    text-shadow: var(--green-glow-strong);
    animation: revealPulse 1.5s ease-in-out infinite, glitchIn 0.5s ease-out;
    text-align: center;
    padding: 0 1rem;
    word-break: break-word;
  }

  @keyframes revealPulse {
    0%, 100% { text-shadow: 0 0 10px #00ff41, 0 0 40px rgba(0,255,65,0.5), 0 0 80px rgba(0,255,65,0.2); }
    50% { text-shadow: 0 0 20px #00ff41, 0 0 60px rgba(0,255,65,0.7), 0 0 120px rgba(0,255,65,0.3); }
  }

  @keyframes glitchIn {
    0% { transform: scale(0.3) translateY(40px); opacity: 0; filter: blur(10px); }
    50% { transform: scale(1.1) translateY(-5px); filter: blur(0); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
  }

  .reveal-subtitle {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    color: var(--green-mid);
    margin-top: 1rem;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .reveal-buttons {
    display: flex;
    gap: 1.25rem;
    margin-top: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }

  .reveal-action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    padding: 1.25rem 2rem;
    min-width: 160px;
    border-width: 2px;
  }

  .reveal-btn-icon {
    font-size: 2rem;
    line-height: 1;
  }

  .reveal-btn-label {
    font-size: 0.75rem;
    letter-spacing: 2px;
  }

  .reveal-remove {
    border-color: #ff3333;
    color: #ff3333;
    background: rgba(255, 51, 51, 0.08);
  }

  .reveal-remove:hover {
    background: rgba(255, 51, 51, 0.22);
    box-shadow: 0 0 20px rgba(255, 51, 51, 0.4);
    text-shadow: 0 0 8px rgba(255, 51, 51, 0.6);
  }

  .reveal-keep {
    border-color: var(--green-mid);
    color: var(--green-mid);
    background: rgba(0, 255, 65, 0.05);
  }

  .reveal-keep:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0, 255, 65, 0.15);
    box-shadow: var(--green-glow);
  }

  .reveal-dismiss-btn {
    font-size: 0.75rem;
    letter-spacing: 3px;
    padding: 0.5rem 1.25rem;
    border-color: rgba(0,255,65,0.25);
    color: var(--green-dim);
    background: transparent;
    align-self: flex-end;
    margin-top: 0.5rem;
  }

  .btn-continue {
    font-family: var(--font-display);
    font-size: clamp(1.4rem, 3vw, 2rem);
    padding: 0.75rem 2.5rem;
    letter-spacing: 6px;
    border-width: 2px;
    border-color: var(--green);
    color: var(--green);
    background: rgba(0,255,65,0.08);
    animation: continuePulse 1.2s ease-in-out infinite;
  }

  .btn-continue:hover {
    background: rgba(0,255,65,0.2);
    box-shadow: var(--green-glow-strong);
  }

  @keyframes continuePulse {
    0%, 100% { box-shadow: 0 0 10px rgba(0,255,65,0.3); }
    50% { box-shadow: 0 0 30px rgba(0,255,65,0.6), 0 0 60px rgba(0,255,65,0.2); }
  }

  /* Main layout */
  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
    position: relative;
    z-index: 10;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .header h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--green);
    text-shadow: var(--green-glow);
    letter-spacing: 6px;
    text-transform: uppercase;
  }

  .header .tagline {
    font-size: 0.8rem;
    color: var(--green-mid);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 0.25rem;
  }

  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  @media (max-width: 768px) {
    .main-grid { grid-template-columns: 1fr; }
  }

  /* Panels */
  .panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.25rem;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.5;
  }

  .panel-title {
    font-family: var(--font-display);
    font-size: 1.2rem;
    color: var(--green);
    text-shadow: 0 0 8px rgba(0,255,65,0.4);
    margin-bottom: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .panel-title .icon {
    font-size: 1rem;
    opacity: 0.7;
  }

  /* Textarea */
  .name-input {
    width: 100%;
    min-height: 140px;
    background: rgba(0, 10, 0, 0.8);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 0.9rem;
    padding: 0.75rem;
    resize: vertical;
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
  }

  .name-input::placeholder {
    color: var(--green-dim);
  }

  .name-input:focus {
    border-color: var(--green);
    box-shadow: 0 0 15px rgba(0,255,65,0.15);
  }

  /* Buttons */
  .btn {
    font-family: var(--font-mono);
    font-size: 0.85rem;
    padding: 0.6rem 1.2rem;
    border: 1px solid var(--green);
    background: rgba(0, 255, 65, 0.08);
    color: var(--green);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.2s;
    border-radius: 3px;
  }

  .btn:hover {
    background: rgba(0, 255, 65, 0.2);
    box-shadow: var(--green-glow);
    text-shadow: 0 0 8px rgba(0,255,65,0.5);
  }

  .btn:active {
    transform: scale(0.97);
    background: rgba(0, 255, 65, 0.3);
  }

  .btn-load {
    margin-top: 0.75rem;
    width: 100%;
  }

  .btn-pick {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    padding: 1rem 3rem;
    letter-spacing: 6px;
    border-width: 2px;
    display: block;
    margin: 1.5rem auto;
    position: relative;
    overflow: hidden;
  }

  .btn-pick::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,255,65,0.1), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }

  .btn-pick:hover::before {
    transform: translateX(100%);
  }

  .btn-pick:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .btn-pick:disabled:hover {
    background: rgba(0, 255, 65, 0.08);
    box-shadow: none;
  }

  .btn-pick:disabled:hover::before {
    transform: translateX(-100%);
  }

  .btn-danger {
    border-color: #ff3333;
    color: #ff3333;
    background: rgba(255, 51, 51, 0.08);
  }

  .btn-danger:hover {
    background: rgba(255, 51, 51, 0.2);
    box-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
    text-shadow: 0 0 8px rgba(255, 51, 51, 0.5);
  }

  .btn-secondary {
    border-color: var(--green-mid);
    color: var(--green-mid);
  }

  .btn-secondary:hover {
    border-color: var(--green);
    color: var(--green);
  }

  /* Pool chips */
  .pool-container {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    min-height: 50px;
    max-height: 300px;
    overflow-y: auto;
    overflow-x: visible;
    padding: 8px 6px 4px 6px;
  }

  .pool-chip {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    padding: 0.3rem 0.65rem;
    border: 1px solid var(--border);
    background: rgba(0, 255, 65, 0.05);
    color: var(--green);
    border-radius: 2px;
    animation: chipIn 0.3s ease-out;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
    user-select: none;
  }

  .pool-chip:hover {
    border-color: rgba(255, 80, 80, 0.5);
    background: rgba(255, 51, 51, 0.07);
    color: rgba(255, 150, 150, 0.9);
  }

  .pool-chip.selected {
    border-color: #ff3333;
    background: rgba(255, 51, 51, 0.12);
    color: #ff6666;
    box-shadow: 0 0 8px rgba(255, 51, 51, 0.3);
    padding-right: 1.6rem;
  }

  .chip-x {
    position: absolute;
    top: -5px;
    right: -5px;
    width: 15px;
    height: 15px;
    background: #ff3333;
    color: #000;
    border-radius: 50%;
    font-size: 0.55rem;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(255, 51, 51, 0.7);
    animation: xPop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 2;
  }

  .chip-x:hover {
    background: #ff6666;
    transform: scale(1.2);
    box-shadow: 0 0 10px rgba(255, 51, 51, 0.9);
  }

  @keyframes xPop {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  @keyframes chipOut {
    from { opacity: 1; transform: scale(1); max-width: 200px; }
    to { opacity: 0; transform: scale(0.7); max-width: 0; padding: 0; margin: 0; border-width: 0; }
  }

  .pool-chip.removing {
    animation: chipOut 0.25s ease-in forwards;
    pointer-events: none;
  }

  @keyframes chipIn {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .pool-empty {
    font-family: var(--font-display);
    font-size: 1.5rem;
    color: #ff3333;
    text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
    text-align: center;
    padding: 2rem;
    animation: emptyPulse 1s ease-in-out infinite;
    letter-spacing: 4px;
  }

  @keyframes emptyPulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  /* Picked log */
  .picked-log {
    max-height: 300px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .picked-entry {
    font-size: 0.85rem;
    color: var(--green-mid);
    padding: 0.25rem 0;
    border-bottom: 1px solid rgba(0, 255, 65, 0.07);
    animation: logIn 0.4s ease-out;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .picked-entry .log-num {
    color: var(--green-dim);
    min-width: 2.5rem;
  }

  .picked-entry .log-name {
    color: var(--green);
    opacity: 0.7;
  }

  @keyframes logIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-empty {
    color: var(--green-dim);
    font-size: 0.8rem;
    font-style: italic;
  }

  /* Pool count */
  .pool-count {
    font-size: 0.75rem;
    color: var(--green-dim);
    margin-bottom: 0.5rem;
  }

  .controls-bar {
    text-align: center;
    margin-top: 1.5rem;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--green-mid); }

  /* Running text at bottom */
  .matrix-footer {
    text-align: center;
    margin-top: 2rem;
    padding: 0.5rem;
    font-size: 0.7rem;
    color: var(--green-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Current chosen display inline */
  .chosen-inline {
    text-align: center;
    padding: 1.5rem 1rem;
    display: none;
    animation: chipIn 0.3s ease-out;
  }

  .chosen-inline.active { display: block; }

  .chosen-name-inline {
    font-family: var(--font-display);
    font-size: clamp(1.5rem, 5vw, 3rem);
    color: var(--green);
    text-shadow: var(--green-glow-strong);
    animation: revealPulse 2s ease-in-out infinite;
    margin-bottom: 1rem;
  }

  .chosen-hint {
    font-size: 0.72rem;
    color: var(--green-dim);
    letter-spacing: 2px;
    margin-top: 1rem;
  }

  .chosen-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .chosen-action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35rem;
    padding: 0.9rem 1.75rem;
    min-width: 120px;
    border-width: 2px;
  }

  .chosen-btn-icon {
    font-size: 1.5rem;
    line-height: 1;
  }

  .chosen-btn-label {
    font-size: 0.7rem;
    letter-spacing: 2px;
  }

  /* Decoration: blinking cursor */
  .cursor-blink::after {
    content: '█';
    animation: blink 1s step-end infinite;
    color: var(--green);
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* Full-width sections */
  .full-width {
    grid-column: 1 / -1;
  }
</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div id="revealOverlay">
  <div class="reveal-subtitle">// SELECTED TARGET</div>
  <div class="revealed-name" id="revealedName"></div>
  <div id="revealContinue" style="display:none; margin-top: 2.5rem;">
    <button class="btn btn-continue" onclick="dismissReveal()">CONTINUE &gt;&gt;</button>
  </div>
</div>

<div class="app">
  <div class="header">
    <h1>⬡ MATRIX PICKER ⬡</h1>
    <div class="tagline">classroom name selection protocol v2.0</div>
  </div>

  <div class="main-grid">
    <!-- Name Input -->
    <div class="panel">
      <div class="panel-title"><span class="icon">▸</span> INPUT NAMES</div>
      <textarea class="name-input" id="nameInput" placeholder="// Paste names here, one per line...&#10;// e.g.&#10;// Aigerim&#10;// Rohan&#10;// Dmitry"></textarea>
      <button class="btn btn-load" onclick="loadNames()">▸ LOAD NAMES</button>
    </div>

    <!-- Active Pool -->
    <div class="panel">
      <div class="panel-title"><span class="icon">◉</span> ACTIVE POOL</div>
      <div class="pool-count" id="poolCount">0 names loaded</div>
      <div class="pool-container" id="poolContainer">
        <div class="log-empty">No names loaded yet...</div>
      </div>
    </div>

    <!-- PICK Button -->
    <div class="full-width" style="text-align: center;">
      <button class="btn btn-pick" id="pickBtn" onclick="pickName()" disabled>⬡ PICK ONE ⬡</button>

      <div class="chosen-inline" id="chosenInline">
        <div class="chosen-name-inline" id="chosenNameInline"></div>
        <div class="chosen-actions">
          <button class="btn btn-danger chosen-action-btn" onclick="removeOnly()">
            <span class="chosen-btn-icon">✕</span>
            <span class="chosen-btn-label">REMOVE</span>
          </button>
          <button class="btn btn-secondary chosen-action-btn" onclick="keepOnly()">
            <span class="chosen-btn-icon">↻</span>
            <span class="chosen-btn-label">KEEP</span>
          </button>
        </div>
        <div class="chosen-hint">// choose to remove from pool or keep, then press PICK ONE</div>
      </div>
    </div>

    <!-- Picked Log -->
    <div class="panel full-width">
      <div class="panel-title"><span class="icon">▪</span> EXTRACTION LOG</div>
      <div class="picked-log" id="pickedLog">
        <div class="log-empty" id="logEmpty">// No extractions recorded...</div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-bar">
    <button class="btn btn-danger" onclick="resetAll()">⟲ CLEAR ALL &amp; RESET</button>
  </div>

  <div class="matrix-footer">
    <span class="cursor-blink">system ready</span>
  </div>
</div>

<script>
// --- State ---
let pool = [];
let picked = [];
let currentName = null;
let rainActive = false;
let rainAnimId = null;

// --- Matrix Rain ---
const canvas = document.getElementById('matrixCanvas');
const ctx = canvas.getContext('2d');
let columns, drops;

const katakana = 'ã‚¢ã‚¤ã‚¦ã‚¨ã‚ªã‚«ã‚­ã‚¯ã‚±ã‚³ã‚µã‚·ã‚¹ã‚»ã‚½ã‚¿ãƒãƒ„ãƒ†ãƒˆãƒŠãƒ‹ãƒŒãƒãƒŽãƒãƒ’ãƒ•ãƒ˜ãƒ›ãƒžãƒŸãƒ ãƒ¡ãƒ¢ãƒ¤ãƒ¦ãƒ¨ãƒ©ãƒªãƒ«ãƒ¬ãƒ­ãƒ¯ãƒ²ãƒ³';
const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&';
const chars = katakana + latin;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  columns = Math.floor(canvas.width / 24);
  drops = Array(columns).fill(1);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function drawRain() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.02)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.font = '24px "Share Tech Mono", monospace';

  for (let i = 0; i < drops.length; i++) {
    const char = chars[Math.floor(Math.random() * chars.length)];
    const isHead = drops[i] % 2 === 0; // bright head character
    if (isHead) {
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = '#00ff41';
      ctx.shadowBlur = 8;
    } else {
      const brightness = Math.random();
      ctx.shadowBlur = 0;
      if (brightness > 0.6) {
        ctx.fillStyle = '#00ff41';
      } else {
        ctx.fillStyle = `rgba(0, 255, 65, ${0.6 + brightness * 0.4})`;
      }
    }
    ctx.fillText(char, i * 24, drops[i] * 24);
    ctx.shadowBlur = 0;

    if (drops[i] * 24 > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
  if (rainActive) {
    rainAnimId = requestAnimationFrame(drawRain);
  }
}

function startRain() {
  rainActive = true;
  canvas.classList.add('active');
  drops = Array(columns).fill(0).map(() => Math.floor(Math.random() * -20));
  drawRain();
}

function stopRain() {
  rainActive = false;
  if (rainAnimId) cancelAnimationFrame(rainAnimId);
  // Fade out
  canvas.classList.remove('active');
  setTimeout(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }, 400);
}

// --- DOM refs ---
const nameInput = document.getElementById('nameInput');
const poolContainer = document.getElementById('poolContainer');
const poolCount = document.getElementById('poolCount');
const pickBtn = document.getElementById('pickBtn');
const chosenInline = document.getElementById('chosenInline');
const chosenNameInline = document.getElementById('chosenNameInline');
const pickedLog = document.getElementById('pickedLog');
const logEmpty = document.getElementById('logEmpty');
const revealOverlay = document.getElementById('revealOverlay');
const revealedName = document.getElementById('revealedName');

// --- Functions ---
function loadNames() {
  const raw = nameInput.value.trim();
  if (!raw) return;
  const names = raw.split('\n').map(n => n.trim()).filter(n => n.length > 0);
  if (names.length === 0) return;

  pool = [...names];
  picked = [];
  currentName = null;
  chosenInline.classList.remove('active');
  nameInput.value = '';
  renderPool();
  renderLog();
  updatePickBtn();
}

function renderPool() {
  poolContainer.innerHTML = '';
  if (pool.length === 0) {
    poolContainer.innerHTML = '<div class="pool-empty">/// POOL EMPTY ///</div>';
    poolCount.textContent = '0 names in pool';
    return;
  }
  poolCount.textContent = `${pool.length} name${pool.length !== 1 ? 's' : ''} in pool`;
  pool.forEach(name => {
    const chip = document.createElement('div');
    chip.className = 'pool-chip';
    chip.textContent = name;
    chip.dataset.name = name;
    chip.addEventListener('click', () => selectChip(chip));
    poolContainer.appendChild(chip);
  });
}

let selectedChip = null;

function selectChip(chip) {
  // Deselect previous
  if (selectedChip && selectedChip !== chip) {
    deselectChip(selectedChip);
  }
  if (selectedChip === chip) {
    deselectChip(chip);
    return;
  }
  selectedChip = chip;
  chip.classList.add('selected');
  // Add X badge
  const x = document.createElement('span');
  x.className = 'chip-x';
  x.textContent = '✕';
  x.addEventListener('click', (e) => {
    e.stopPropagation();
    removeFromPool(chip);
  });
  chip.appendChild(x);
}

function deselectChip(chip) {
  chip.classList.remove('selected');
  const x = chip.querySelector('.chip-x');
  if (x) x.remove();
  selectedChip = null;
}

function removeFromPool(chip) {
  const name = chip.dataset.name;
  selectedChip = null;
  chip.classList.add('removing');
  chip.classList.remove('selected');
  setTimeout(() => {
    const idx = pool.indexOf(name);
    if (idx > -1) pool.splice(idx, 1);
    // If this was the current pending name, clear it
    if (currentName === name) {
      currentName = null;
      chosenInline.classList.remove('active');
    }
    renderPool();
    updatePickBtn();
  }, 250);
}

// Click outside chips to deselect
document.addEventListener('click', (e) => {
  if (selectedChip && !selectedChip.contains(e.target)) {
    deselectChip(selectedChip);
  }
});

function renderLog() {
  if (picked.length === 0) {
    pickedLog.innerHTML = '<div class="log-empty" id="logEmpty">// No extractions recorded...</div>';
    return;
  }
  pickedLog.innerHTML = '';
  picked.forEach((name, i) => {
    const entry = document.createElement('div');
    entry.className = 'picked-entry';
    entry.innerHTML = `<span class="log-num">[${String(i + 1).padStart(2, '0')}]</span><span class="log-name">${name}</span>`;
    pickedLog.appendChild(entry);
  });
  pickedLog.scrollTop = pickedLog.scrollHeight;
}

function updatePickBtn() {
  // Only enable PICK ONE when pool has names AND no pending decision
  pickBtn.disabled = pool.length === 0 || currentName !== null;
}

function pickName() {
  if (pool.length === 0) return;

  pickBtn.disabled = true;
  chosenInline.classList.remove('active');

  // Start Matrix rain
  startRain();

  // Suspense: rapid name cycling overlay
  revealOverlay.classList.add('active');
  revealOverlay.classList.add('picking');
  document.getElementById('revealContinue').style.display = 'none';
  revealedName.style.animation = 'none';

  let cycles = 0;
  const maxCycles = 20;
  const interval = setInterval(() => {
    const randomName = pool[Math.floor(Math.random() * pool.length)];
    revealedName.textContent = randomName;
    revealedName.style.opacity = 0.4 + Math.random() * 0.4;
    revealedName.style.filter = `blur(${Math.max(0, 3 - cycles * 0.2)}px)`;
    cycles++;
    if (cycles >= maxCycles) {
      clearInterval(interval);
      const chosen = pool[Math.floor(Math.random() * pool.length)];
      currentName = chosen;

      setTimeout(() => {
        // Freeze rain - stop animation but keep last frame visible
        rainActive = false;
        if (rainAnimId) cancelAnimationFrame(rainAnimId);
        revealOverlay.classList.remove('picking');
        revealedName.textContent = chosen;
        revealedName.style.opacity = 1;
        revealedName.style.filter = 'none';
        revealedName.style.animation = '';
        chosenNameInline.textContent = chosen;
        updatePickBtn();
        document.getElementById('revealContinue').style.display = 'block';
      }, 500);
    }
  }, 80);
}

// Called from overlay: REMOVE & PICK AGAIN
function overlayRemoveAndPick() {
  if (!currentName) return;
  const idx = pool.indexOf(currentName);
  if (idx > -1) pool.splice(idx, 1);
  picked.push(currentName);
  currentName = null;
  revealOverlay.classList.remove('active');
  chosenInline.classList.remove('active');
  renderPool();
  renderLog();
  if (pool.length > 0) {
    setTimeout(() => pickName(), 400);
  } else {
    updatePickBtn();
  }
}

// Called from overlay: KEEP & PICK AGAIN
function overlayKeepAndPick() {
  if (!currentName) return;
  currentName = null;
  revealOverlay.classList.remove('active');
  chosenInline.classList.remove('active');
  if (pool.length > 0) {
    setTimeout(() => pickName(), 400);
  } else {
    updatePickBtn();
  }
}

// Called from overlay: DISMISS — show inline pending state, block PICK ONE
function dismissReveal() {
  revealOverlay.classList.remove('active');
  stopRain();
  // Show the name inline with remove/keep options, PICK ONE stays disabled
  chosenNameInline.textContent = currentName;
  chosenInline.classList.add('active');
  updatePickBtn(); // still disabled because currentName !== null
}

// Called from inline: REMOVE only (no auto-pick)
function removeOnly() {
  if (!currentName) return;
  const idx = pool.indexOf(currentName);
  if (idx > -1) pool.splice(idx, 1);
  picked.push(currentName);
  currentName = null;
  chosenInline.classList.remove('active');
  renderPool();
  renderLog();
  updatePickBtn(); // now re-enables PICK ONE if pool not empty
}

// Called from inline: KEEP only (no auto-pick)
function keepOnly() {
  if (!currentName) return;
  currentName = null;
  chosenInline.classList.remove('active');
  updatePickBtn(); // now re-enables PICK ONE
}

function resetAll() {
  pool = [];
  picked = [];
  currentName = null;
  chosenInline.classList.remove('active');
  revealOverlay.classList.remove('active');
  stopRain();
  renderPool();
  renderLog();
  updatePickBtn();
  poolContainer.innerHTML = '<div class="log-empty">No names loaded yet...</div>';
  poolCount.textContent = '0 names loaded';
}
</script>
</body>
</html>
