<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мемори: Нейроны</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1b2a;
    font-family: 'Consolas', 'Courier New', monospace;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    overflow: hidden;
  }

  h1 { font-size: 1rem; color: #00d4ff; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2px; }
  .subtitle { font-size: 0.65rem; color: #7a8fa6; margin-bottom: 10px; letter-spacing: 1px; }

  .layout {
    display: flex;
    gap: 12px;
    align-items: stretch;
    width: 100%;
    max-width: 700px;
  }

  /* --- SIDEBARS --- */
  .sidebar {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 90px;
    flex-shrink: 0;
    border: 2px solid #1e3d5c;
    border-radius: 10px;
    padding: 12px 8px;
    background: #111e2e;
    gap: 6px;
    transition: all 0.3s;
  }
  .sidebar.active-p1 { border-color: #00d4ff; background: #0a2038; box-shadow: 0 0 16px rgba(0,212,255,0.2); }
  .sidebar.active-p2 { border-color: #f59e0b; background: #1c1200; box-shadow: 0 0 16px rgba(245,158,11,0.2); }
  .sidebar.active-p1 .pname { color: #00d4ff; }
  .sidebar.active-p2 .pname { color: #f59e0b; }
  .pname { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; color: #7a8fa6; text-align: center; }
  .pscore { font-size: 2.4rem; font-weight: bold; color: #e0e0e0; line-height: 1; }
  .plabel { font-size: 0.55rem; color: #7a8fa6; letter-spacing: 1px; }
  .pturn { font-size: 0.6rem; height: 12px; color: transparent; text-align: center; margin-top: 4px; }
  .active-p1 .pturn { color: #00d4ff; }
  .active-p2 .pturn { color: #f59e0b; }
  .moves-small { font-size: 0.6rem; color: #7a8fa6; margin-top: 8px; text-align: center; }
  .moves-small span { color: #e0e0e0; font-size: 0.85rem; display: block; }

  /* --- GRID AREA --- */
  .grid-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
  }

  /* Card slot — always occupies space, card fades/shrinks out when matched */
  .card {
    aspect-ratio: 3/4;
    cursor: pointer;
    perspective: 600px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .card.gone {
    opacity: 0;
    transform: scale(0.6);
    pointer-events: none;
    cursor: default;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative; transform-style: preserve-3d;
    transition: transform 0.36s ease; border-radius: 8px;
  }
  .card.flipped .card-inner { transform: rotateY(180deg); }
  .card-front, .card-back {
    position: absolute; width: 100%; height: 100%;
    border-radius: 8px; backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 6px;
  }
  .card-num { position: absolute; bottom: 5px; right: 7px; font-size: 0.55rem; color: #4a6a8a; font-family: 'Consolas', monospace; }
  .card-front { background: #1a2e45; border: 2px solid #1e3d5c; font-size: 1.3rem; transition: border-color 0.2s; }
  .card:not(.gone):not(.flipped):hover .card-front { border-color: #00d4ff; }
  .card-back { transform: rotateY(180deg); font-size: 0.68rem; font-weight: bold; line-height: 1.3; }

  .card[data-pair="0"] .card-back { background: #0a2e1e; border: 2px solid #2ecc71; color: #2ecc71; }
  .card[data-pair="1"] .card-back { background: #1a1a2e; border: 2px solid #a855f7; color: #d8b4fe; }
  .card[data-pair="2"] .card-back { background: #1e1500; border: 2px solid #f59e0b; color: #fcd34d; }
  .card[data-pair="3"] .card-back { background: #1a0a0a; border: 2px solid #ef4444; color: #fca5a5; }
  .card[data-pair="4"] .card-back { background: #001a1e; border: 2px solid #06b6d4; color: #67e8f9; }
  .card[data-pair="5"] .card-back { background: #0f1a00; border: 2px solid #84cc16; color: #bef264; }

  .card.wrong .card-inner { animation: shake 0.36s ease; }
  @keyframes shake {
    0%,100% { transform: rotateY(180deg); }
    25% { transform: rotateY(180deg) translateX(-4px); }
    75% { transform: rotateY(180deg) translateX(4px); }
  }

  /* --- FOUND PAIRS LOG --- */
  .found-log {
    width: 100%;
    min-height: 22px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: center;
  }

  .found-chip {
    font-size: 0.6rem;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    white-space: nowrap;
  }
  .found-chip.show { opacity: 1; transform: translateY(0); }
  .found-chip.p1 { background: #0a2038; border: 1px solid #00d4ff; color: #00d4ff; }
  .found-chip.p2 { background: #1c1200; border: 1px solid #f59e0b; color: #f59e0b; }

  /* --- BUTTON & WIN --- */
  .btn {
    background: #1a2e45; border: 2px solid #00d4ff; color: #00d4ff;
    font-family: inherit; font-size: 0.72rem; letter-spacing: 2px;
    text-transform: uppercase; padding: 7px 20px; border-radius: 6px;
    cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .btn:hover { background: #00d4ff; color: #0d1b2a; }

  .win-msg {
    display: none; text-align: center; padding: 10px 20px;
    border-radius: 8px; width: 100%;
  }
  .win-msg.show { display: block; }
  .win-msg h2 { font-size: 0.95rem; letter-spacing: 2px; margin-bottom: 3px; }
  .win-msg p  { font-size: 0.65rem; color: #b0b0b0; }
  .win-p1 { background: #0a2038; border: 2px solid #00d4ff; }
  .win-p1 h2 { color: #00d4ff; }
  .win-p2 { background: #1c1200; border: 2px solid #f59e0b; }
  .win-p2 h2 { color: #f59e0b; }
  .win-draw { background: #101010; border: 2px solid #ffd700; }
  .win-draw h2 { color: #ffd700; }
</style>
</head>
<body>

<h1>Мемори: Нейроны</h1>
<p class="subtitle">Найди пары · Два игрока</p>

<div class="layout">

  <div class="sidebar" id="p1card">
    <div class="pname">Игрок 1</div>
    <div class="pscore" id="p1score">0</div>
    <div class="plabel">пар</div>
    <div class="pturn">▶ ХОД</div>
    <div class="moves-small">Ходов<span id="moves">0</span></div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
    <div class="found-log" id="foundLog"></div>
    <div class="win-msg" id="winMsg">
      <h2 id="winTitle"></h2>
      <p id="winText"></p>
    </div>
    <button class="btn" onclick="initGame()">Новая игра</button>
  </div>

  <div class="sidebar" id="p2card">
    <div class="pname">Игрок 2</div>
    <div class="pscore" id="p2score">0</div>
    <div class="plabel">пар</div>
    <div class="pturn">▶ ХОД</div>
  </div>

</div>

<script>
const PAIRS = [
  { a: "АКСОН",       b: "Передаёт сигнал",        pair: 0 },
  { a: "ДЕНДРИТ",     b: "Получает сигнал",         pair: 1 },
  { a: "ТЕЛО КЛЕТКИ", b: "Обрабатывает сигнал",     pair: 2 },
  { a: "ДОФАМИН",     b: "Нейромедиатор",           pair: 3 },
  { a: "АДРЕНАЛИН",   b: "Гормон",                  pair: 4 },
  { a: "СИНАПС",      b: "Место передачи сигнала",  pair: 5 },
];

let cards = [], flipped = [], matched = 0, moves = 0, locked = false;
let currentPlayer = 1, scores = [0, 0];

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function updateUI() {
  document.getElementById('moves').textContent = moves;
  document.getElementById('p1score').textContent = scores[0];
  document.getElementById('p2score').textContent = scores[1];
  document.getElementById('p1card').className = 'sidebar' + (currentPlayer === 1 ? ' active-p1' : '');
  document.getElementById('p2card').className = 'sidebar' + (currentPlayer === 2 ? ' active-p2' : '');
}

function initGame() {
  matched = 0; moves = 0; flipped = []; locked = false;
  currentPlayer = 1; scores = [0, 0];
  document.getElementById('winMsg').className = 'win-msg';
  document.getElementById('foundLog').innerHTML = '';

  cards = [];
  PAIRS.forEach(p => {
    cards.push({ text: p.a, pair: p.pair });
    cards.push({ text: p.b, pair: p.pair });
  });
  cards = shuffle(cards);

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.pair = c.pair;
    el.dataset.index = i;
    el.innerHTML = '<div class="card-inner"><div class="card-front">🧠<span class="card-num">' + (i+1) + '</span></div><div class="card-back">' + c.text + '</div></div>';
    el.addEventListener('click', () => onCardClick(el, i));
    grid.appendChild(el);
  });
  updateUI();
}

function onCardClick(el, i) {
  if (locked || el.classList.contains('flipped') || el.classList.contains('gone')) return;
  el.classList.add('flipped');
  flipped.push({ el, i });
  if (flipped.length < 2) return;

  locked = true;
  moves++;
  const [a, b] = flipped;

  if (cards[a.i].pair === cards[b.i].pair) {
    const pairIdx = cards[a.i].pair;
    const player = currentPlayer;
    setTimeout(() => {
      // Fade out both cards
      a.el.classList.add('gone');
      b.el.classList.add('gone');

      // Add chip to found log
      const p = PAIRS[pairIdx];
      const chip = document.createElement('div');
      chip.className = 'found-chip p' + player;
      chip.textContent = p.a + ' — ' + p.b;
      document.getElementById('foundLog').appendChild(chip);
      // Trigger animation
      requestAnimationFrame(() => requestAnimationFrame(() => chip.classList.add('show')));

      scores[player - 1]++;
      matched++;
      flipped = [];
      locked = false;
      updateUI();
      if (matched === PAIRS.length) showWin();
    }, 600);
  } else {
    a.el.classList.add('wrong');
    b.el.classList.add('wrong');
    setTimeout(() => {
      a.el.classList.remove('flipped', 'wrong');
      b.el.classList.remove('flipped', 'wrong');
      flipped = [];
      locked = false;
      currentPlayer = currentPlayer === 1 ? 2 : 1;
      updateUI();
    }, 900);
  }
}

function showWin() {
  const msg = document.getElementById('winMsg');
  if (scores[0] > scores[1]) {
    msg.className = 'win-msg show win-p1';
    document.getElementById('winTitle').textContent = '🏆 Игрок 1 победил!';
  } else if (scores[1] > scores[0]) {
    msg.className = 'win-msg show win-p2';
    document.getElementById('winTitle').textContent = '🏆 Игрок 2 победил!';
  } else {
    msg.className = 'win-msg show win-draw';
    document.getElementById('winTitle').textContent = '🤝 Ничья!';
  }
  document.getElementById('winText').textContent = 'Игрок 1: ' + scores[0] + ' пар · Игрок 2: ' + scores[1] + ' пар · Ходов: ' + moves;
}

initGame();
</script>
</body>
</html>
